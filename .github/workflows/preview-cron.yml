name: Cron mensuel

on:
  schedule:
    - cron: '0 0 2 * *'

jobs:
  monthly-job:
    runs-on: ubuntu-latest
    steps:
      - name: Afficher l'URL du endpoint (pour debug)
        run: echo "URL=${{ secrets.PREVIEW_CET_EXTRA_URL }}" 
      - name: Appel du endpoint de batch
        run: |
          curl -X POST \
            -H "X-Cron-Secret: ${{ secrets.X_CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            ${{ secrets.PREVIEW_CET_EXTRA_URL }}/api/private/batchs/security/encrypt
